name: Publish to PyPI / TestPyPI

# Triggers on any v* tag:
#   v0.2.0b1, v0.2.0rc1  → TestPyPI (beta/pre-release)
#   v0.2.0               → PyPI (stable)
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Gate: run tests before publishing ────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest --cov=kanari_agent --cov-fail-under=80

  # ── Beta: publish pre-release tags to TestPyPI ───────────────────────────────
  # Matches: v0.2.0b1, v0.2.0b2, v0.2.0rc1, v0.2.0a1
  publish-beta:
    name: Publish to TestPyPI (beta)
    needs: test
    runs-on: ubuntu-latest
    if: |
      contains(github.ref_name, 'b') ||
      contains(github.ref_name, 'rc') ||
      contains(github.ref_name, 'a')
    environment: testpypi  # must match the environment in TestPyPI Trusted Publisher config

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(poetry version --short)
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag $TAG does not match package version $PKG"
            exit 1
          fi
          echo "✅ Tag matches package version: $PKG"

      - name: Build package
        run: poetry build

      - name: Inspect built artifacts
        run: ls -lh dist/

      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Stable: publish release tags to PyPI ─────────────────────────────────────
  # Matches: v0.2.0, v1.0.0  (no pre-release suffix)
  publish-stable:
    name: Publish to PyPI (stable)
    needs: test
    runs-on: ubuntu-latest
    if: |
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc') &&
      !contains(github.ref_name, 'a')
    environment: pypi  # requires manual approval in GitHub repo settings

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(poetry version --short)
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag $TAG does not match package version $PKG"
            exit 1
          fi
          echo "✅ Tag matches package version: $PKG"

      - name: Build package
        run: poetry build

      - name: Inspect built artifacts
        run: ls -lh dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
